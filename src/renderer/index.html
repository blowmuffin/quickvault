<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container" id="appContainer">
    <!-- Header -->
    <div class="header" id="header">
      <div class="header-left">
        <div class="app-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#a78bfa"/><stop offset="100%" style="stop-color:#6366f1"/></linearGradient></defs>
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <span class="app-title">QuickVault</span>
      </div>
      <div class="header-right">
        <button class="header-btn" id="dashboardBtn" title="Dashboard">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        </button>
        <button class="header-btn" id="exportBtn" title="Export">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="header-btn" id="viewModeBtn" title="Compact/Expanded">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="header-btn" id="themeBtn" title="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="themeIcon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <span class="item-count" id="itemCount">0</span>
        <button class="close-btn" id="closeBtn" title="Hide (Esc)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <!-- Input Bar (F3: multi-line textarea) -->
    <div class="input-section">
      <div class="input-wrapper" id="inputWrapper">
        <div class="input-icon" id="inputIcon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <textarea id="mainInput" class="main-input" placeholder="Paste a link or type a note... (Enter to save, Shift+Enter for new line)" autocomplete="off" spellcheck="false" rows="1"></textarea>
        <div class="input-badge" id="inputBadge"></div>
      </div>
    </div>

    <!-- Tag Filter Bar -->
    <div class="tag-bar" id="tagBar">
      <button class="tag-pill active" data-tag="all">All</button>
    </div>

    <!-- Main Content -->
    <div class="content-area" id="contentArea">
      <div class="items-view" id="itemsView">
        <div class="items-container" id="itemsContainer">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
            <p class="empty-text">No items yet</p>
            <p class="empty-hint">Paste a URL or type a note • Use #tags • Shift+Enter for multi-line</p>
          </div>
          <div class="items-list" id="itemsList"></div>
        </div>
      </div>
      <div class="dashboard-view hidden" id="dashboardView">
        <div class="dash-grid" id="dashGrid"></div>
      </div>
    </div>

    <!-- Undo Toast (F2) -->
    <div class="undo-toast hidden" id="undoToast">
      <span>Item deleted</span>
      <button class="undo-btn" id="undoBtn">Undo</button>
    </div>

    <!-- Export Modal -->
    <div class="modal-overlay hidden" id="exportModal">
      <div class="modal">
        <div class="modal-header"><h3>Export Data</h3><button class="close-btn" id="closeExportModal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="modal-body">
          <button class="export-option" data-format="markdown"><span class="export-icon">📄</span><span class="export-label">Markdown</span><span class="export-ext">.md</span></button>
          <button class="export-option" data-format="json"><span class="export-icon">{ }</span><span class="export-label">JSON</span><span class="export-ext">.json</span></button>
          <button class="export-option" data-format="html"><span class="export-icon">🌐</span><span class="export-label">HTML</span><span class="export-ext">.html</span></button>
        </div>
      </div>
    </div>

    <!-- Password Modal -->
    <div class="modal-overlay hidden" id="passwordModal">
      <div class="modal">
        <div class="modal-header"><h3 id="passwordModalTitle">Encrypt Note</h3><button class="close-btn" id="closePasswordModal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="modal-body">
          <input type="password" id="passwordInput" class="modal-input" placeholder="Enter password..." autocomplete="off"/>
          <p class="modal-hint" id="passwordHint">This password is NOT stored. Remember it!</p>
          <button class="modal-action-btn" id="passwordSubmit">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Edit Modal (F1) -->
    <div class="modal-overlay hidden" id="editModal">
      <div class="modal modal-wide">
        <div class="modal-header"><h3>Edit Item</h3><button class="close-btn" id="closeEditModal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div class="modal-body">
          <label class="modal-label">Title</label>
          <input type="text" id="editTitle" class="modal-input" autocomplete="off"/>
          <label class="modal-label">Content</label>
          <textarea id="editContent" class="modal-input modal-textarea" rows="4"></textarea>
          <label class="modal-label">Tags (comma-separated)</label>
          <input type="text" id="editTags" class="modal-input" placeholder="work, research" autocomplete="off"/>
          <button class="modal-action-btn" id="editSave">Save Changes</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="shortcut-hint">Ctrl+Shift+Space • Enter to save • Shift+Enter for new line • #tags</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
